name: Release
on:
  workflow_dispatch:
    inputs:
      app:
        description: App to republish
        type: choice
        options:
          - All
          - ManuscriptStudio
          - ConceptStudio
        default: All

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout governance build targets
        shell: bash
        run: |
          set -euo pipefail
          gov="../novolis-governance"
          if [ ! -f "$gov/build/Novolis.Version.targets" ]; then
            git clone --depth 1 --branch main \
              "https://github.com/${{ github.repository_owner }}/novolis-governance.git" "$gov"
          fi

      - uses: Novolis-Platform/novolis-workflows/actions/setup-dotnet@main
        with:
          dotnet-version: 10.0.x

      - uses: Novolis-Platform/novolis-workflows/actions/authenticate-github-packages@main
        with:
          token: ${{ github.token }}

      - uses: Novolis-Platform/novolis-workflows/actions/read-version@main
        id: ver

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install innosetup -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw "Chocolatey failed to install Inno Setup." }

      - name: Publish selected apps
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.ver.outputs.package-version }}
          ASSEMBLY_VERSION: ${{ steps.ver.outputs.assembly-version }}
          FILE_VERSION: ${{ steps.ver.outputs.file-version }}
          SELECTED_APP: ${{ inputs.app }}
        run: |
          $ErrorActionPreference = 'Stop'
          . ./scripts/Publish-NovolisApp.ps1

          $allApps = @(
            @{ Key = 'manuscript-studio'; Project = 'src/ManuscriptStudio/ManuscriptStudio.csproj' },
            @{ Key = 'concept-studio'; Project = 'src/ConceptStudio/ConceptStudio.csproj' }
          )

          $selected = switch ($env:SELECTED_APP) {
            'ManuscriptStudio' { @($allApps[0]) }
            'ConceptStudio' { @($allApps[1]) }
            default { $allApps }
          }

          $published = @()
          foreach ($app in $selected) {
            $published += Publish-NovolisApp `
              -RepoRoot $env:GITHUB_WORKSPACE `
              -AppKey $app.Key `
              -ProjectRelativePath $app.Project `
              -PackageVersion $env:PACKAGE_VERSION `
              -AssemblyVersion $env:ASSEMBLY_VERSION `
              -FileVersion $env:FILE_VERSION
          }

          $assets = @()
          foreach ($item in $published) {
            $assets += $item.ZipPath
            if ($item.InstallerPath) { $assets += $item.InstallerPath }
          }

          $tag = "v$env:PACKAGE_VERSION"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Novolis Apps $env:PACKAGE_VERSION" --generate-notes
            if ($LASTEXITCODE -ne 0) { throw "gh release create failed with exit code $LASTEXITCODE." }
          }
          gh release upload $tag @assets --clobber
          if ($LASTEXITCODE -ne 0) { throw "gh release upload failed with exit code $LASTEXITCODE." }
